<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f5f7fb">
<title>과자 가격 비교표</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:'Malgun Gothic',system-ui,-apple-system,sans-serif;background:#f5f7fb;color:#172033}button,input{font:inherit}header{position:sticky;top:0;z-index:10;background:rgba(245,247,251,.96);backdrop-filter:blur(10px);padding:12px;border-bottom:1px solid #dfe4ec}h1{font-size:22px;margin:0;text-align:center}.sub{text-align:center;color:#667085;font-size:13px;margin:5px 0 10px}.bars{max-width:1100px;margin:auto;display:grid;gap:8px}.bar{display:grid;grid-template-columns:1fr auto;gap:8px}.bar input{min-width:0;padding:12px;border:1px solid #cfd6e1;border-radius:12px;background:#fff}.btn{border:0;border-radius:12px;padding:11px 13px;font-weight:900;cursor:pointer}.primary{background:#1d4ed8;color:#fff}.soft{background:#e8edf5;color:#344054}.dark{background:#111827;color:#fff}.danger{background:#fee2e2;color:#b42318}.wrap{max-width:1100px;margin:auto;padding:12px}.tip{background:#fff;border:1px solid #dde3ec;border-radius:14px;padding:10px 12px;color:#667085;font-size:12px;line-height:1.5;margin-bottom:10px}.tablebox{overflow:auto;background:#fff;border:1px solid #dce2eb;border-radius:16px}.sheet{width:100%;min-width:760px;border-collapse:separate;border-spacing:0}.sheet th,.sheet td{border-right:1px solid #e1e6ee;border-bottom:1px solid #e1e6ee;padding:9px;text-align:center;vertical-align:middle}.sheet th{position:sticky;top:0;background:#eef2f7;font-size:13px;z-index:2}.sheet th:first-child,.sheet td:first-child{position:sticky;left:0;z-index:3;background:#fff}.sheet th:first-child{background:#eef2f7;z-index:4}.product{min-width:230px;text-align:left!important}.phead{display:flex;align-items:center;justify-content:space-between;gap:8px}.pname{font-weight:900;overflow-wrap:anywhere}.mini{width:32px;height:32px;border:0;border-radius:50%;background:#fee2e2;color:#b42318;font-size:18px;font-weight:900}.spec{font-size:11px;color:#667085;margin-top:4px;line-height:1.45}.edit-spec{border:0;background:none;color:#1d4ed8;font-size:11px;font-weight:800;padding:4px 0}.stars{white-space:nowrap;margin-top:3px}.star{border:0;background:none;padding:0 1px;color:#cbd1da;font-size:20px}.star.on{color:#f59e0b}.pricecell{min-width:145px}.priceinput{width:96px;text-align:right;border:1px solid #d7dde7;border-radius:9px;padding:8px;background:#fff;font-weight:800}.find{display:block;width:100%;margin-top:6px;border:0;border-radius:9px;padding:7px;background:#e8efff;color:#1746a2;font-size:12px;font-weight:900}.manual{font-size:11px;color:#667085;margin-top:5px}.best{background:#ecfdf3!important}.best .priceinput{border-color:#12b76a;color:#087a49}.score{min-width:105px;font-weight:900;color:#d92d20}.storehead{display:flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap}.storedelete{border:0;border-radius:50%;width:24px;height:24px;background:#fee2e2;color:#b42318;font-weight:900}.foot{display:flex;gap:8px;margin-top:10px}.foot button{flex:1}.modal{display:none;position:fixed;inset:0;z-index:30;background:#0009;padding:16px;align-items:flex-end;justify-content:center}.modal.open{display:flex}.panel{width:min(680px,100%);max-height:88vh;overflow:auto;background:#fff;border-radius:20px 20px 12px 12px;padding:14px}.panel h2{margin:0 0 10px;font-size:18px}.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.formgrid label{font-size:12px;color:#667085;font-weight:800}.formgrid input{width:100%;margin-top:4px;padding:10px;border:1px solid #d7dde7;border-radius:10px}.span2{grid-column:1/3}.candidate{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:11px;border:1px solid #e1e6ee;border-radius:12px;margin:7px 0;background:#fafbfc;text-align:left}.fallback{display:grid;gap:8px;margin-top:12px}.status{font-size:12px;color:#667085;margin:5px 0 10px}@media(max-width:600px){.bar{grid-template-columns:1fr}.bar button{width:100%}.wrap{padding:10px}.modal{padding:0}.panel{border-radius:20px 20px 0 0}.foot{display:grid}.sheet{min-width:720px}.formgrid{grid-template-columns:1fr}.span2{grid-column:auto}}
</style>
</head>
<body>
<header><h1>🛒 과자 가격 비교표</h1><p class="sub">과자 규격과 판매처별 가격을 함께 비교하세요</p><div class="bars"><div class="bar"><input id="newName" placeholder="과자 이름 입력"><button class="btn primary" onclick="addSnack()">＋ 과자 추가</button></div><div class="bar"><input id="newStore" placeholder="동네 마트 이름 입력 (예: 행복마트)"><button class="btn soft" onclick="addStore()">＋ 마트 열 추가</button></div></div></header>
<main class="wrap"><div class="tip">1단계 반영: 과자마다 브랜드·총중량·개수·바코드를 저장할 수 있습니다. 규격을 입력하면 다음 단계에서 묶음 수량과 단위가격을 정확하게 비교할 수 있습니다.</div><div class="tablebox"><table class="sheet"><thead><tr id="headRow"></tr></thead><tbody id="rows"></tbody></table></div><div class="foot"><button class="btn soft" onclick="sortRows()">🔥 가성비순 정렬</button><button class="btn soft" onclick="resetAll()">↩️ 전체 초기화</button></div></main>
<div class="modal" id="modal" onclick="if(event.target===modal)closeModal()"><section class="panel"><div id="modalBody"></div></section></div>
<script>
const FIXED={coupang:{label:'쿠팡',url:q=>`https://www.coupang.com/np/search?q=${encodeURIComponent(q)}`},gs25:{label:'GS25',url:q=>`https://gs25.gsretail.com/gscvs/ko/products/event-goods?searchWord=${encodeURIComponent(q)}`},emart24:{label:'이마트24',url:q=>`https://m.emart24.co.kr/goods/event?search=${encodeURIComponent(q)}`}};
const defaultStores=[{id:'coupang',name:'쿠팡',fixed:true},{id:'gs25',name:'GS25',fixed:true},{id:'emart24',name:'이마트24',fixed:true}];
const defaultSnacks=['몽쉘 딸기','버터링 초코','오예스 쿠앤크'].map((name,i)=>({id:String(Date.now()+i),name,brand:'',weight:0,count:0,barcode:'',rating:0,prices:{}}));
let stores=loadStores(),snacks=loadSnacks(),active=null;
function migrateSnack(s){return{id:String(s.id||Date.now()+Math.random()),name:s.name||'이름 없음',brand:s.brand||'',weight:Number(s.weight)||0,count:Number(s.count)||0,barcode:s.barcode||'',rating:Number(s.rating)||0,prices:s.prices||{}}}
function loadStores(){try{const v=JSON.parse(localStorage.getItem('snackStoresV3'));return Array.isArray(v)&&v.length?v:defaultStores.map(x=>({...x}))}catch{return defaultStores.map(x=>({...x}))}}
function loadSnacks(){try{const raw=JSON.parse(localStorage.getItem('snackSheetV3'));const list=Array.isArray(raw)?raw:defaultSnacks;return list.map(migrateSnack)}catch{return defaultSnacks.map(migrateSnack)}}
function save(){localStorage.setItem('snackStoresV3',JSON.stringify(stores));localStorage.setItem('snackSheetV3',JSON.stringify(snacks))}
function esc(v=''){return String(v).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function specText(s){const parts=[];if(s.brand)parts.push(s.brand);if(s.weight)parts.push(`${s.weight}g`);if(s.count)parts.push(`${s.count}개`);if(s.barcode)parts.push(`바코드 ${s.barcode}`);return parts.length?parts.join(' · '):'규격 미입력'}
function bestPrice(s){const p=stores.map(x=>Number(s.prices?.[x.id])).filter(x=>x>0);return p.length?Math.min(...p):0}
function score(s){const p=bestPrice(s);return p&&s.rating?Number((s.rating/p*1000).toFixed(2)):0}
function render(){headRow.innerHTML='<th class="product">과자 / 규격 / 만족도</th>'+stores.map(s=>`<th><div class="storehead">${esc(s.name)}${s.fixed?'':`<button class="storedelete" onclick="removeStore('${s.id}')">×</button>`}</div></th>`).join('')+'<th>최저가 기준<br>가성비</th>';rows.innerHTML='';if(!snacks.length){rows.innerHTML=`<tr><td colspan="${stores.length+2}">과자를 추가해 주세요.</td></tr>`;return}snacks.forEach(s=>{const best=bestPrice(s),tr=document.createElement('tr');tr.innerHTML=`<td class="product"><div class="phead"><div class="pname">${esc(s.name)}</div><button class="mini" onclick="removeSnack('${s.id}')">×</button></div><div class="spec">${esc(specText(s))}</div><button class="edit-spec" onclick="editSpec('${s.id}')">규격 수정</button><div class="stars">${[1,2,3,4,5].map(n=>`<button class="star ${s.rating>=n?'on':''}" onclick="rate('${s.id}',${n})">★</button>`).join('')}</div></td>`+stores.map(st=>`<td class="pricecell ${best&&Number(s.prices[st.id])===best?'best':''}"><input class="priceinput" type="number" inputmode="numeric" min="0" placeholder="가격" value="${s.prices[st.id]||''}" onchange="setPrice('${s.id}','${st.id}',this.value)"> 원${st.fixed?`<button class="find" onclick="findSimilar('${s.id}','${st.id}')">유사 상품 찾기</button>`:'<div class="manual">수동 입력</div>'}</td>`).join('')+`<td class="score">${score(s)?score(s)+'점':'-'}</td>`;rows.appendChild(tr)})}
function addSnack(){const name=newName.value.trim();if(name.length<2)return alert('과자 이름을 2글자 이상 입력하세요.');const s=migrateSnack({id:String(Date.now()),name,prices:{}});snacks.unshift(s);newName.value='';save();render();editSpec(s.id)}
function addStore(){const name=newStore.value.trim();if(name.length<2)return alert('마트 이름을 2글자 이상 입력하세요.');if(stores.some(s=>s.name===name))return alert('같은 이름의 마트 열이 있습니다.');stores.push({id:'local_'+Date.now(),name,fixed:false});newStore.value='';save();render()}
function removeStore(id){const st=stores.find(s=>s.id===id);if(!st||st.fixed||!confirm(`“${st.name}” 열을 삭제할까요?`))return;stores=stores.filter(s=>s.id!==id);snacks.forEach(s=>delete s.prices[id]);save();render()}
function removeSnack(id){const s=snacks.find(x=>x.id===id);if(s&&confirm(`“${s.name}”을 삭제할까요?`)){snacks=snacks.filter(x=>x.id!==id);save();render()}}
function rate(id,n){snacks.find(x=>x.id===id).rating=n;save();render()}
function setPrice(id,k,v){snacks.find(x=>x.id===id).prices[k]=Math.max(0,Number(v)||0);save();render()}
function sortRows(){snacks.sort((a,b)=>score(b)-score(a));save();render()}
function resetAll(){if(!confirm('과자·규격·가격·동네 마트 열을 모두 초기화할까요?'))return;stores=defaultStores.map(x=>({...x}));snacks=defaultSnacks.map(migrateSnack);save();render()}
function editSpec(id){const s=snacks.find(x=>x.id===id);modalBody.innerHTML=`<h2>과자 정보 수정</h2><div class="formgrid"><label class="span2">상품명<input id="fName" value="${esc(s.name)}"></label><label>브랜드<input id="fBrand" value="${esc(s.brand)}" placeholder="예: 롯데"></label><label>총중량(g)<input id="fWeight" type="number" inputmode="numeric" min="0" value="${s.weight||''}" placeholder="예: 384"></label><label>구성 개수<input id="fCount" type="number" inputmode="numeric" min="0" value="${s.count||''}" placeholder="예: 12"></label><label>바코드<input id="fBarcode" inputmode="numeric" value="${esc(s.barcode)}" placeholder="선택 입력"></label></div><div class="foot"><button class="btn primary" onclick="saveSpec('${s.id}')">저장</button><button class="btn soft" onclick="closeModal()">취소</button></div>`;modal.classList.add('open')}
function saveSpec(id){const s=snacks.find(x=>x.id===id);const name=fName.value.trim();if(name.length<2)return alert('상품명을 2글자 이상 입력하세요.');s.name=name;s.brand=fBrand.value.trim();s.weight=Math.max(0,Number(fWeight.value)||0);s.count=Math.max(0,Number(fCount.value)||0);s.barcode=fBarcode.value.trim();save();render();closeModal()}
function clean(v=''){return v.replace(/!\[[^\]]*\]\([^)]*\)/g,' ').replace(/\[([^\]]+)\]\([^)]*\)/g,'$1').replace(/[*_#>|`]/g,' ').replace(/\s+/g,' ').trim()}
function tokens(q){return q.toLowerCase().replace(/[^0-9a-z가-힣 ]/g,' ').split(/\s+/).filter(x=>x.length>1)}
function similarity(name,q){const t=tokens(q),n=name.toLowerCase();return t.reduce((a,x)=>a+(n.includes(x)?1:0),0)/Math.max(1,t.length)}
function parseProducts(text,store,q){const out=[],seen=new Set(),re=/([0-9][0-9,]{2,})\s*원/g;let m;while((m=re.exec(text))&&out.length<20){const lines=text.slice(Math.max(0,m.index-320),m.index).split('\n').map(clean).filter(x=>x.length>1&&x.length<150);const name=[...lines].reverse().find(x=>similarity(x,q)>0)||q,price=Number(m[1].replace(/,/g,'')),key=name+'|'+price;if(price&&similarity(name,q)>0&&!seen.has(key)){seen.add(key);out.push({store,name,price,sim:similarity(name,q)})}}return out.sort((a,b)=>b.sim-a.sim)}
async function findSimilar(id,store){const s=snacks.find(x=>x.id===id);active={id,store,q:s.name};modalBody.innerHTML=`<h2>${FIXED[store].label} · ${esc(s.name)}</h2><div class="status" id="status">유사 상품 가격을 찾고 있습니다…</div><div id="candidates"></div><div class="fallback" id="fallback"></div><button class="btn soft" style="width:100%;margin-top:10px" onclick="closeModal()">닫기</button>`;modal.classList.add('open');try{const r=await fetch('https://r.jina.ai/'+FIXED[store].url(s.name));if(!r.ok)throw 0;const items=parseProducts(await r.text(),store,s.name).slice(0,12);if(!items.length)throw 0;status.textContent=`${items.length}개 후보 중 선택하세요.`;items.forEach(x=>{const b=document.createElement('button');b.className='candidate';b.innerHTML=`<span><strong>${esc(x.name)}</strong><small>${Math.round(x.sim*100)}% 유사</small></span><b>${x.price.toLocaleString()}원</b>`;b.onclick=()=>{s.prices[store]=x.price;save();render();closeModal()};candidates.appendChild(b)})}catch{status.textContent='자동 가격을 찾지 못했습니다.';const b=document.createElement('button');b.className='btn dark';b.textContent=`${FIXED[store].label} 검색 열기`;b.onclick=()=>window.open(FIXED[store].url(s.name),'_blank','noopener');fallback.appendChild(b)}}
function closeModal(){modal.classList.remove('open')}
newName.addEventListener('keydown',e=>{if(e.key==='Enter')addSnack()});newStore.addEventListener('keydown',e=>{if(e.key==='Enter')addStore()});save();render();
</script>
</body>
</html>
