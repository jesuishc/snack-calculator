<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#f5f7fb"><title>과자 가격 비교표</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,'Malgun Gothic',sans-serif;background:#f5f7fb;color:#172033}button,input,select{font:inherit}header{position:sticky;top:0;z-index:10;background:#f5f7fbf2;backdrop-filter:blur(10px);padding:12px;border-bottom:1px solid #dfe4ec}h1{font-size:21px;margin:0;text-align:center}.sub{text-align:center;color:#667085;font-size:12px;margin:4px 0 9px}.bars{max-width:1200px;margin:auto;display:grid;gap:7px}.bar{display:grid;grid-template-columns:1fr auto;gap:7px}.bar input,.bar select{min-width:0;padding:11px;border:1px solid #cfd6e1;border-radius:11px;background:#fff}.btn{border:0;border-radius:11px;padding:10px 12px;font-weight:850;cursor:pointer}.primary{background:#1d4ed8;color:#fff}.soft{background:#e8edf5;color:#344054}.dark{background:#111827;color:#fff}.danger{background:#fee2e2;color:#b42318}.wrap{max-width:1200px;margin:auto;padding:11px}.toolbar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:8px}.toolbar select{padding:9px;border:1px solid #cfd6e1;border-radius:10px;background:white}.tip{background:#fff;border:1px solid #dde3ec;border-radius:13px;padding:9px 11px;color:#667085;font-size:11px;line-height:1.5;margin-bottom:9px}.tablebox{overflow:auto;background:#fff;border:1px solid #dce2eb;border-radius:15px}.sheet{width:100%;min-width:840px;border-collapse:separate;border-spacing:0}.sheet th,.sheet td{border-right:1px solid #e1e6ee;border-bottom:1px solid #e1e6ee;padding:8px;text-align:center;vertical-align:middle}.sheet th{position:sticky;top:0;background:#eef2f7;font-size:12px;z-index:2}.sheet th:first-child,.sheet td:first-child{position:sticky;left:0;z-index:3;background:#fff}.sheet th:first-child{background:#eef2f7;z-index:4}.product{min-width:235px;text-align:left!important}.phead{display:flex;align-items:center;justify-content:space-between;gap:7px}.pname{font-weight:900;overflow-wrap:anywhere}.mini{width:30px;height:30px;border:0;border-radius:50%;background:#fee2e2;color:#b42318;font-size:18px;font-weight:900}.spec,.source{font-size:10px;color:#667085;margin-top:3px;line-height:1.4}.edit{border:0;background:none;color:#1d4ed8;font-size:10px;font-weight:800;padding:3px 0}.stars{white-space:nowrap}.star{border:0;background:none;padding:0 1px;color:#cbd1da;font-size:19px}.star.on{color:#f59e0b}.pricecell{min-width:170px}.mainprice{font-weight:900;font-size:14px}.unit{font-size:10px;color:#667085;line-height:1.45;margin-top:3px}.find{display:block;width:100%;margin-top:5px;border:0;border-radius:8px;padding:7px;background:#e8efff;color:#1746a2;font-size:11px;font-weight:900}.best{background:#ecfdf3!important}.score{min-width:100px;font-weight:900;color:#d92d20}.storehead{display:flex;align-items:center;justify-content:center;gap:4px;white-space:nowrap}.storedelete{border:0;border-radius:50%;width:22px;height:22px;background:#fee2e2;color:#b42318;font-weight:900}.foot{display:flex;gap:7px;margin-top:9px}.foot button{flex:1}.modal{display:none;position:fixed;inset:0;z-index:30;background:#0009;padding:14px;align-items:flex-end;justify-content:center}.modal.open{display:flex}.panel{width:min(720px,100%);max-height:90vh;overflow:auto;background:#fff;border-radius:20px 20px 10px 10px;padding:14px}.panel h2{margin:0 0 9px;font-size:18px}.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.formgrid label{font-size:11px;color:#667085;font-weight:800}.formgrid input,.formgrid select{width:100%;margin-top:4px;padding:9px;border:1px solid #d7dde7;border-radius:9px}.span2{grid-column:1/3}.candidate{display:grid;grid-template-columns:1fr auto;gap:8px;width:100%;align-items:center;padding:10px;border:1px solid #e1e6ee;border-radius:11px;margin:7px 0;background:#fafbfc;text-align:left}.candidate strong{font-size:13px}.candidate small{display:block;color:#667085;margin-top:3px}.candidate .won{font-weight:900;color:#d92d20;white-space:nowrap}.warn{color:#b54708!important}.good{color:#087a49!important}.badge{display:inline-block;padding:2px 6px;border-radius:999px;background:#edf2ff;color:#214ca0;font-size:10px;font-weight:900;margin-left:4px}.status{font-size:11px;color:#667085;margin:4px 0 9px}.fallback{display:grid;gap:7px;margin-top:10px}.cloud{font-size:11px;color:#667085;margin-left:auto;align-self:center}@media(max-width:600px){.bar{grid-template-columns:1fr}.bar button{width:100%}.wrap{padding:8px}.modal{padding:0}.panel{border-radius:20px 20px 0 0}.foot{display:grid}.sheet{min-width:800px}.formgrid{grid-template-columns:1fr}.span2{grid-column:auto}}
</style></head><body>
<header><h1>🛒 과자 가격 비교표</h1><p class="sub">규격이 같은 상품을 선택하고 판매처별 실질 단가를 비교합니다</p>
<div class="bars"><div class="bar"><input id="newName" placeholder="과자 이름 입력"><button class="btn primary" onclick="addSnack()">＋ 과자 추가</button></div><div class="bar"><input id="newStore" placeholder="동네 마트 이름 입력"><button class="btn soft" onclick="addStore()">＋ 마트 열 추가</button></div></div></header>
<main class="wrap">
<div class="toolbar"><select id="basis" onchange="setBasis(this.value)"><option value="total">결제금액 비교</option><option value="each">개당 가격 비교</option><option value="100g">100g당 가격 비교</option></select><button class="btn soft" onclick="openStoreSettings()">📍 기준 점포</button><button class="btn soft" onclick="syncCloud('push')">☁️ 저장</button><button class="btn soft" onclick="syncCloud('pull')">☁️ 불러오기</button><span class="cloud" id="cloudStatus">로컬 저장</span></div>
<div class="tip">검색 후보는 상품명·브랜드·중량·개수·바코드 일치도를 점수화합니다. 후보를 직접 선택해야 가격이 반영되며, 선택한 상품 URL과 상품 ID가 다음 조회를 위해 저장됩니다.</div>
<div class="tablebox"><table class="sheet"><thead><tr id="headRow"></tr></thead><tbody id="rows"></tbody></table></div>
<div class="foot"><button class="btn soft" onclick="sortRows()">🔥 가성비순 정렬</button><button class="btn soft" onclick="resetAll()">↩️ 전체 초기화</button></div></main>
<div class="modal" id="modal" onclick="if(event.target===modal)closeModal()"><section class="panel"><div id="modalBody"></div></section></div>
<script src="config.js"></script><script>
const CONFIG=window.SNACK_CONFIG||{};
const FIXED={coupang:{label:'쿠팡',url:q=>`https://www.coupang.com/np/search?q=${encodeURIComponent(q)}`},gs25:{label:'GS25',url:q=>`https://gs25.gsretail.com/gscvs/ko/products/event-goods?searchWord=${encodeURIComponent(q)}`},emart24:{label:'이마트24',url:q=>`https://m.emart24.co.kr/goods/event?search=${encodeURIComponent(q)}`}};
const defaultsStores=[{id:'coupang',name:'쿠팡',fixed:true},{id:'gs25',name:'GS25',fixed:true},{id:'emart24',name:'이마트24',fixed:true}];
const defaultsSnacks=['몽쉘 딸기','버터링 초코','오예스 쿠앤크'].map((name,i)=>({id:String(Date.now()+i),name,brand:'',weight:0,count:0,barcode:'',rating:0,offers:{}}));
let stores=load('snackStoresV4',defaultsStores),snacks=load('snackSheetV4',null),basisMode=localStorage.getItem('snackBasis')||'total',active=null;
if(!snacks){const old=load('snackSheetV3',defaultsSnacks);snacks=old.map(migrateSnack)}else snacks=snacks.map(migrateSnack);
basis.value=basisMode;
function load(k,f){try{const x=JSON.parse(localStorage.getItem(k));return x??structuredClone(f)}catch{return structuredClone(f)}}
function num(v){return Math.max(0,Number(v)||0)}
function emptyOffer(v=0){return{price:num(v),bundles:1,shipping:0,promo:'none',note:'',checkedAt:'',sourceUrl:'',productId:'',matchedName:'',matchScore:0,candidateWeight:0,candidateCount:0}}
function migrateOffer(v){if(typeof v==='number')return emptyOffer(v);return{...emptyOffer(),...(v||{}),price:num(v?.price),bundles:num(v?.bundles)||1,shipping:num(v?.shipping),candidateWeight:num(v?.candidateWeight),candidateCount:num(v?.candidateCount)}}
function migrateSnack(s){const offers={};const src=s.offers||s.prices||{};Object.entries(src).forEach(([k,v])=>offers[k]=migrateOffer(v));return{id:String(s.id||Date.now()+Math.random()),name:s.name||'이름 없음',brand:s.brand||'',weight:num(s.weight),count:num(s.count),barcode:s.barcode||'',rating:num(s.rating),offers}}
function save(){localStorage.setItem('snackStoresV4',JSON.stringify(stores));localStorage.setItem('snackSheetV4',JSON.stringify(snacks));localStorage.setItem('snackBasis',basisMode)}
function esc(v=''){return String(v).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function received(o){const b=num(o.bundles)||1;return o.promo==='1+1'?b*2:o.promo==='2+1'?b*1.5:o.promo==='3+1'?b*4/3:b}
function metrics(s,o){o=migrateOffer(o);if(!o.price)return{total:0,each:0,g100:0};const total=o.price*(o.bundles||1)+o.shipping,r=received(o),pieces=(s.count||1)*r,grams=(s.weight||0)*r;return{total,each:pieces?total/pieces:0,g100:grams?total/grams*100:0}}
function compareValue(s,o){const m=metrics(s,o);return basisMode==='each'?m.each:basisMode==='100g'?m.g100:m.total}
function bestValue(s){const a=stores.map(st=>compareValue(s,s.offers[st.id])).filter(x=>x>0);return a.length?Math.min(...a):0}
function score(s){const v=bestValue(s);return v&&s.rating?Number((s.rating/v*1000).toFixed(2)):0}
function fmt(v){return v?Math.round(v).toLocaleString():'-'}
function specText(s){return [s.brand,s.weight?`${s.weight}g`:'',s.count?`${s.count}개`:'',s.barcode?`바코드 ${s.barcode}`:''].filter(Boolean).join(' · ')||'규격 미입력'}
function render(){headRow.innerHTML='<th class="product">과자 / 규격 / 만족도</th>'+stores.map(s=>`<th><div class="storehead">${esc(s.name)}${s.fixed?'':`<button class="storedelete" onclick="removeStore('${s.id}')">×</button>`}</div></th>`).join('')+'<th>가성비</th>';rows.innerHTML='';if(!snacks.length){rows.innerHTML=`<tr><td colspan="${stores.length+2}">과자를 추가해 주세요.</td></tr>`;return}
snacks.forEach(s=>{const best=bestValue(s),tr=document.createElement('tr');tr.innerHTML=`<td class="product"><div class="phead"><div class="pname">${esc(s.name)}</div><button class="mini" onclick="removeSnack('${s.id}')">×</button></div><div class="spec">${esc(specText(s))}</div><button class="edit" onclick="editSpec('${s.id}')">규격 수정</button><div class="stars">${[1,2,3,4,5].map(n=>`<button class="star ${s.rating>=n?'on':''}" onclick="rate('${s.id}',${n})">★</button>`).join('')}</div></td>`+stores.map(st=>{const o=migrateOffer(s.offers[st.id]),m=metrics(s,o),v=compareValue(s,o),bestCls=best&&Math.abs(v-best)<.01?'best':'';const src=o.matchedName?`<div class="source" title="${esc(o.sourceUrl)}">↳ ${esc(o.matchedName)} · 일치 ${o.matchScore||0}%</div>`:'';return`<td class="pricecell ${bestCls}"><div class="mainprice">${o.price?o.price.toLocaleString()+'원':'가격 없음'}</div><div class="unit">결제 ${fmt(m.total)}원<br>개당 ${fmt(m.each)}원 · 100g ${fmt(m.g100)}원</div>${src}<button class="find" onclick="${st.fixed?`findSimilar('${s.id}','${st.id}')`:`editOffer('${s.id}','${st.id}')`}">${st.fixed?'상품 찾기':'가격 입력'}</button>${o.price?`<button class="edit" onclick="editOffer('${s.id}','${st.id}')">상세 수정</button>`:''}</td>`}).join('')+`<td class="score">${score(s)?score(s)+'점':'-'}</td>`;rows.appendChild(tr)})}
function setBasis(v){basisMode=v;save();render()}
function addSnack(){const name=newName.value.trim();if(name.length<2)return alert('과자 이름을 2글자 이상 입력하세요.');const s=migrateSnack({id:String(Date.now()),name});snacks.unshift(s);newName.value='';save();render();editSpec(s.id)}
function addStore(){const name=newStore.value.trim();if(name.length<2)return alert('마트 이름을 2글자 이상 입력하세요.');if(stores.some(s=>s.name===name))return alert('같은 이름이 있습니다.');stores.push({id:'local_'+Date.now(),name,fixed:false});newStore.value='';save();render()}
function removeStore(id){const st=stores.find(x=>x.id===id);if(!st||st.fixed||!confirm(`“${st.name}” 열을 삭제할까요?`))return;stores=stores.filter(x=>x.id!==id);snacks.forEach(s=>delete s.offers[id]);save();render()}
function removeSnack(id){const s=snacks.find(x=>x.id===id);if(s&&confirm(`“${s.name}”을 삭제할까요?`)){snacks=snacks.filter(x=>x.id!==id);save();render()}}
function rate(id,n){snacks.find(x=>x.id===id).rating=n;save();render()}
function sortRows(){snacks.sort((a,b)=>score(b)-score(a));save();render()}
function resetAll(){if(!confirm('모든 데이터를 초기화할까요?'))return;stores=structuredClone(defaultsStores);snacks=structuredClone(defaultsSnacks).map(migrateSnack);save();render()}
function editSpec(id){const s=snacks.find(x=>x.id===id);modalBody.innerHTML=`<h2>과자 규격</h2><div class="formgrid"><label class="span2">상품명<input id="fName" value="${esc(s.name)}"></label><label>브랜드<input id="fBrand" value="${esc(s.brand)}"></label><label>총중량(g)<input id="fWeight" type="number" value="${s.weight||''}"></label><label>구성 개수<input id="fCount" type="number" value="${s.count||''}"></label><label>바코드<input id="fBarcode" value="${esc(s.barcode)}"></label></div><div class="foot"><button class="btn primary" onclick="saveSpec('${id}')">저장</button><button class="btn soft" onclick="closeModal()">취소</button></div>`;modal.classList.add('open')}
function saveSpec(id){const s=snacks.find(x=>x.id===id);s.name=fName.value.trim()||s.name;s.brand=fBrand.value.trim();s.weight=num(fWeight.value);s.count=num(fCount.value);s.barcode=fBarcode.value.trim();save();render();closeModal()}
function editOffer(id,store){const s=snacks.find(x=>x.id===id),o=migrateOffer(s.offers[store]);modalBody.innerHTML=`<h2>${esc(stores.find(x=>x.id===store)?.name||store)} 가격 상세</h2><div class="formgrid"><label>판매가격<input id="oPrice" type="number" value="${o.price||''}"></label><label>판매 묶음 수<input id="oBundles" type="number" value="${o.bundles||1}"></label><label>배송비<input id="oShipping" type="number" value="${o.shipping||''}"></label><label>행사<select id="oPromo"><option value="none">없음</option><option value="1+1">1+1</option><option value="2+1">2+1</option><option value="3+1">3+1</option></select></label><label class="span2">메모<input id="oNote" value="${esc(o.note)}"></label><label class="span2">상품 URL<input id="oUrl" value="${esc(o.sourceUrl)}"></label><label>상품 ID<input id="oPid" value="${esc(o.productId)}"></label><label>선택 상품명<input id="oMatched" value="${esc(o.matchedName)}"></label></div><div class="foot"><button class="btn primary" onclick="saveOffer('${id}','${store}')">저장</button><button class="btn soft" onclick="closeModal()">취소</button></div>`;oPromo.value=o.promo;modal.classList.add('open')}
function saveOffer(id,store){const s=snacks.find(x=>x.id===id),old=migrateOffer(s.offers[store]);s.offers[store]={...old,price:num(oPrice.value),bundles:num(oBundles.value)||1,shipping:num(oShipping.value),promo:oPromo.value,note:oNote.value.trim(),sourceUrl:oUrl.value.trim(),productId:oPid.value.trim(),matchedName:oMatched.value.trim(),checkedAt:new Date().toISOString()};save();render();closeModal()}
function tokens(q){return q.toLowerCase().replace(/[^0-9a-z가-힣 ]/g,' ').split(/\s+/).filter(x=>x.length>1)}
function textScore(a,b){const ta=tokens(a),tb=tokens(b),hit=ta.filter(x=>tb.some(y=>y.includes(x)||x.includes(y))).length;return ta.length?hit/ta.length:0}
function extractNum(name,re){const m=name.match(re);return m?num(m[1]):0}
function candidateMeta(name,url=''){return{name,weight:extractNum(name,/(\d+(?:\.\d+)?)\s*g/i),count:extractNum(name,/(\d+)\s*(?:개|입|p|pack)/i),barcode:'',url,productId:(url.match(/(?:products\/|itemId=|vendorItemId=)([\w-]+)/i)||[])[1]||''}}
function matchCandidate(s,c){let points=textScore(`${s.brand} ${s.name}`,c.name)*55,notes=[];if(s.brand&&c.name.includes(s.brand))points+=15;else if(s.brand)notes.push('브랜드 미확인');if(s.weight&&c.weight){const d=Math.abs(s.weight-c.weight)/s.weight;points+=Math.max(0,15*(1-d));if(d>.1)notes.push(`중량 ${c.weight}g`)}else if(s.weight)notes.push('중량 미확인');if(s.count&&c.count){const d=Math.abs(s.count-c.count)/s.count;points+=Math.max(0,10*(1-d));if(d>.1)notes.push(`수량 ${c.count}개`)}else if(s.count)notes.push('수량 미확인');if(s.barcode&&c.barcode===s.barcode)points=100;return{score:Math.min(100,Math.round(points)),notes}}
function clean(v=''){return v.replace(/!\[[^\]]*\]\([^)]*\)/g,' ').replace(/\[([^\]]+)\]\(([^)]+)\)/g,'$1|$2').replace(/[*_#>|`]/g,' ').replace(/\s+/g,' ').trim()}
function parseProducts(text,store,s){const out=[],seen=new Set(),re=/([0-9][0-9,]{2,})\s*원/g;let m;while((m=re.exec(text))&&out.length<25){const block=text.slice(Math.max(0,m.index-420),m.index),lines=block.split('\n').map(clean).filter(x=>x.length>2&&x.length<180);const raw=[...lines].reverse().find(x=>textScore(`${s.brand} ${s.name}`,x)>.25)||'';if(!raw)continue;const [name,url='']=raw.split('|'),price=num(m[1].replace(/,/g,'')),key=name+'|'+price;if(!price||seen.has(key))continue;seen.add(key);const c={store,price,...candidateMeta(name,url)};Object.assign(c,matchCandidate(s,c));out.push(c)}return out.sort((a,b)=>b.score-a.score)}
async function searchBackend(s,store){if(!CONFIG.apiBase)return null;const point=load('snackStoreSettings',{});const u=new URL(CONFIG.apiBase.replace(/\/$/,'')+'/api/search');u.searchParams.set('q',`${s.brand} ${s.name}`.trim());u.searchParams.set('retailer',store);u.searchParams.set('weight',s.weight||'');u.searchParams.set('count',s.count||'');u.searchParams.set('barcode',s.barcode||'');u.searchParams.set('storeId',point[store]?.id||'');const r=await fetch(u);if(!r.ok)throw new Error('백엔드 검색 실패');return r.json()}
async function findSimilar(id,store){const s=snacks.find(x=>x.id===id);active={id,store};modalBody.innerHTML=`<h2>${FIXED[store].label} 후보 검색</h2><div class="status" id="status">규격이 비슷한 상품을 찾고 있습니다…</div><div id="candidateList"></div><div class="fallback" id="fallback"></div><button class="btn soft" style="width:100%;margin-top:8px" onclick="closeModal()">닫기</button>`;modal.classList.add('open');try{let items;const remote=await searchBackend(s,store);if(remote?.products)items=remote.products.map(x=>{const c={store,...x,...candidateMeta(x.name,x.url)};return{...c,...matchCandidate(s,c)}});else{const r=await fetch('https://r.jina.ai/'+FIXED[store].url(`${s.brand} ${s.name}`.trim()));if(!r.ok)throw 0;items=parseProducts(await r.text(),store,s)}showCandidates(items.slice(0,12),s)}catch{status.textContent='자동 검색에 실패했습니다. 공식 검색 화면에서 확인 후 수동 입력하세요.';const b=document.createElement('button');b.className='btn dark';b.textContent='공식 검색 열기';b.onclick=()=>window.open(FIXED[store].url(s.name),'_blank','noopener');fallback.appendChild(b)}}
function showCandidates(items,s){status.textContent=items.length?`${items.length}개 후보입니다. 규격을 확인하고 직접 선택하세요.`:'후보가 없습니다.';candidateList.innerHTML='';items.forEach(c=>{const b=document.createElement('button');b.className='candidate';const cls=c.score>=80?'good':c.score<55?'warn':'';b.innerHTML=`<span><strong>${esc(c.name)}</strong><small class="${cls}">일치 ${c.score}% · ${c.weight?c.weight+'g':'중량 미확인'} · ${c.count?c.count+'개':'수량 미확인'}${c.notes?.length?' · '+esc(c.notes.join(', ')):''}</small></span><span class="won">${c.price.toLocaleString()}원</span>`;b.onclick=()=>chooseCandidate(c);candidateList.appendChild(b)})}
function chooseCandidate(c){const s=snacks.find(x=>x.id===active.id),old=migrateOffer(s.offers[active.store]);s.offers[active.store]={...old,price:c.price,matchedName:c.name,matchScore:c.score,sourceUrl:c.url||FIXED[active.store].url(c.name),productId:c.productId||'',candidateWeight:c.weight||0,candidateCount:c.count||0,checkedAt:new Date().toISOString()};save();render();editOffer(s.id,active.store)}
function openStoreSettings(){const p=load('snackStoreSettings',{});modalBody.innerHTML=`<h2>기준 점포 설정</h2><div class="formgrid"><label>GS25 점포명<input id="gsName" value="${esc(p.gs25?.name||'')}"></label><label>GS25 점포 ID<input id="gsId" value="${esc(p.gs25?.id||'')}"></label><label>이마트24 점포명<input id="emName" value="${esc(p.emart24?.name||'')}"></label><label>이마트24 점포 ID<input id="emId" value="${esc(p.emart24?.id||'')}"></label></div><div class="tip">현재 공개 웹검색은 점포별 재고를 보장하지 않습니다. 백엔드 어댑터가 연결되면 이 점포 ID를 검색 요청에 사용합니다.</div><div class="foot"><button class="btn primary" onclick="saveStoreSettings()">저장</button><button class="btn soft" onclick="closeModal()">취소</button></div>`;modal.classList.add('open')}
function saveStoreSettings(){localStorage.setItem('snackStoreSettings',JSON.stringify({gs25:{name:gsName.value.trim(),id:gsId.value.trim()},emart24:{name:emName.value.trim(),id:emId.value.trim()}}));closeModal();cloudStatus.textContent='기준 점포 저장됨'}
async function syncCloud(mode){if(!CONFIG.apiBase){cloudStatus.textContent='백엔드 미연결';return alert('config.js에 apiBase를 설정해야 합니다.')}const userId=localStorage.getItem('snackUserId')||crypto.randomUUID();localStorage.setItem('snackUserId',userId);try{const url=CONFIG.apiBase.replace(/\/$/,'')+'/api/snapshot?userId='+encodeURIComponent(userId);if(mode==='push'){const r=await fetch(url,{method:'PUT',headers:{'content-type':'application/json'},body:JSON.stringify({stores,snacks,basisMode,storeSettings:load('snackStoreSettings',{})})});if(!r.ok)throw 0;cloudStatus.textContent='클라우드 저장 완료'}else{const r=await fetch(url);if(!r.ok)throw 0;const d=await r.json();stores=d.stores||stores;snacks=(d.snacks||snacks).map(migrateSnack);basisMode=d.basisMode||basisMode;localStorage.setItem('snackStoreSettings',JSON.stringify(d.storeSettings||{}));basis.value=basisMode;save();render();cloudStatus.textContent='클라우드 불러오기 완료'}}catch{cloudStatus.textContent='동기화 실패'}}
function closeModal(){modal.classList.remove('open')}newName.addEventListener('keydown',e=>{if(e.key==='Enter')addSnack()});newStore.addEventListener('keydown',e=>{if(e.key==='Enter')addStore()});save();render();
</script></body></html>
