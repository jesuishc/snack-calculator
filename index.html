<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>마트 과자 가성비 계산기</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:'Malgun Gothic',system-ui,sans-serif;background:#f6f7fb;color:#1f2937}header{position:sticky;top:0;z-index:10;background:rgba(246,247,251,.95);backdrop-filter:blur(8px);padding:14px;border-bottom:1px solid #e5e7eb}h1{margin:0;text-align:center;font-size:22px}.subtitle{text-align:center;color:#6b7280;font-size:13px;margin:6px 0 0}.topbox{margin:12px 0 0;background:white;border:1px solid #e5e7eb;border-radius:14px;padding:12px}.topbox strong{color:#2563eb}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}button{border:0;border-radius:12px;padding:10px;font-weight:800;font-size:14px;cursor:pointer}.primary{background:#2563eb;color:white}.ghost{background:#e5e7eb;color:#374151}.cards{padding:14px;display:grid;gap:12px;max-width:900px;margin:0 auto}.card{background:white;border:1px solid #e5e7eb;border-radius:18px;padding:12px;box-shadow:0 5px 14px rgba(0,0,0,.06)}.top{display:grid;grid-template-columns:86px 1fr;gap:12px}.thumb{width:86px;height:86px;border-radius:14px;object-fit:cover;background:#eef2ff;border:1px solid #e5e7eb}.name{font-size:17px;font-weight:900;margin-bottom:5px}.meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}.badge{padding:4px 8px;border-radius:999px;font-size:12px;font-weight:900}.coupang{background:#dbeafe;color:#1d4ed8}.bmart{background:#ffedd5;color:#c2410c}.equal{background:#e5e7eb;color:#374151}.note{font-size:12px;color:#6b7280}.stars{display:flex;gap:2px}.star{font-size:24px;background:transparent;color:#d1d5db;padding:0}.star.on{color:#f59e0b}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.field{background:#f9fafb;border:1px solid #e5e7eb;border-radius:12px;padding:8px}.label{font-size:11px;color:#6b7280;margin-bottom:4px;font-weight:800}.pricebox{display:flex;align-items:center;gap:4px}input{width:100%;border:0;background:transparent;font-size:15px;font-weight:800;outline:none;color:#1f2937}.won{font-size:13px;color:#6b7280;font-weight:800}.score{font-size:18px;font-weight:1000;color:#ef4444}.urlrow{display:grid;grid-template-columns:1fr auto auto;gap:6px;margin-top:8px}.urlrow input{background:#f9fafb;border:1px solid #e5e7eb;border-radius:12px;padding:9px;font-size:12px}.apply{background:#111827;color:white;font-size:12px}.search{background:#16a34a;color:white;font-size:12px}.help{padding:0 14px 18px;max-width:900px;margin:0 auto;color:#6b7280;font-size:12px;line-height:1.5}.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:99;align-items:center;justify-content:center;padding:20px}.modal.open{display:flex}.modalbox{background:white;border-radius:18px;padding:12px;width:min(96vw,520px)}.modal img{width:100%;max-height:70vh;object-fit:contain;border-radius:12px}.close{width:100%;margin-top:10px;background:#111827;color:white}@media(min-width:760px){.cards{grid-template-columns:repeat(2,1fr)}.actions{max-width:520px;margin:10px auto 0}}@media(max-width:380px){.top{grid-template-columns:74px 1fr}.thumb{width:74px;height:74px}.grid{grid-template-columns:1fr}.urlrow{grid-template-columns:1fr 1fr}.urlrow input{grid-column:1/3}}
</style>
</head>
<body>
<header>
<h1>🛒 마트 과자 가성비 계산기</h1>
<p class="subtitle">가격 수정 · 별점 선택 · 대표 이미지 자동 표시 · 모바일 최적화</p>
<div class="topbox" id="topResult">아직 만족도를 선택하지 않았습니다.</div>
<div class="actions"><button class="primary" onclick="sortCards()">🔥 가성비순 정렬</button><button class="ghost" onclick="resetAll()">↩️ 전체 초기화</button></div>
</header>
<main class="cards" id="cards"></main>
<div class="help">기본 이미지는 상품명 기반 대표 썸네일로 자동 표시됩니다. 이상하면 🔍 검색으로 원하는 이미지를 찾고 URL을 직접 붙여넣어 바꿀 수 있습니다.</div>
<div class="modal" id="modal" onclick="closeModal(event)"><div class="modalbox"><img id="modalImg"><b id="modalTitle"></b><button class="close" onclick="hideModal()">닫기</button></div></div>
<script>
const fallback='https://placehold.co/500x500/f3f4f6/334155?text=Snack';
const data=[
['mongshell_strawberry','몽쉘 딸기','coupang','💡 쿠팡',4980,'-'],['butterring_choco','버터링 초코','coupang','쿠팡',4070,'비마트 미판매'],['ohyes_cnc','오예스 쿠앤크','coupang','쿠팡',4800,'비마트 미판매'],['butterwaffle_isigny','버터와플 이즈니','coupang','💡 쿠팡',3280,'-'],['churros_choco','츄러스 초코','bmart','💡 비마트',1480,'-'],['chocopie_mango','초코파이 망고','coupang','💡 쿠팡',4690,'-'],['fresh_berry','후레쉬 베리수','coupang','💡 쿠팡',5650,'-'],['custard_peanut','카스타드 피넛버터','coupang','💡 쿠팡',2730,'-'],['dubai_heim','두바이 하임','coupang','💡 쿠팡',3690,'-'],['ohyes_pistachio','오예스 피스타치오','coupang','쿠팡',5100,'비마트 미판매'],['bigpie_lemon','빅파이 레몬','bmart','💡 비마트',4080,'-'],['na_sand','나! 샌드','bmart','비마트',1390,'쿠팡 미판매'],['custard_matcha','카스타드 말차','bmart','💡 비마트',4735,'쿠팡 2개 기준 단가 환산'],['homerunball','홈런볼','bmart','💡 비마트',5600,'-'],['bbotto_cheese','뽀또 체다치즈','equal','동일',2700,'쿠팡 2개 기준 단가 환산'],['nurungji_maple','누룽지 메이플','coupang','💡 쿠팡',1360,'-'],['noodlefit_spicy','누들핏 매콤','coupang','💡 쿠팡',2530,'쿠팡 2개 기준 단가 환산'],['chocopie_matcha','초코파이 말차','coupang','💡 쿠팡',4560,'-'],['butterring_pistachio','버터링 피스타치오','bmart','💡 비마트',3290,'-'],['matcha_heim','말차하임','bmart','💡 비마트',6390,'-']];
let snacks=load();
function autoImg(n){return 'https://tse4.mm.bing.net/th?q='+encodeURIComponent(n+' 과자 제품 이미지')+'&w=300&h=300&c=7&rs=1&p=0&o=5&pid=1.7'}
function img(s){return s.img||autoImg(s.name)}
function load(){let saved=JSON.parse(localStorage.getItem('snackData')||'{}');return data.map(x=>({id:x[0],name:x[1],store:x[2],storeText:x[3],price:x[4],note:x[5],...(saved[x[0]]||{})}))}
function save(){let o={};snacks.forEach(s=>o[s.id]={price:s.price,rating:s.rating||0,img:s.img||''});localStorage.setItem('snackData',JSON.stringify(o))}
function score(s){return s.rating>0&&s.price>0?Number(((s.rating/s.price)*1000).toFixed(2)):0}
function render(){cards.innerHTML='';snacks.forEach(s=>{let sc=score(s);let el=document.createElement('section');el.className='card';el.innerHTML=`<div class="top"><img class="thumb" src="${img(s)}" onerror="this.src=fallback" onclick="show('${s.id}')"><div><div class="name" onclick="show('${s.id}')">${s.name}</div><div class="meta"><span class="badge ${s.store}">${s.storeText}</span><span class="note">${s.note}</span></div><div class="stars">${[1,2,3,4,5].map(n=>`<button class="star ${(s.rating||0)>=n?'on':''}" onclick="rate('${s.id}',${n})">★</button>`).join('')}</div></div></div><div class="grid"><div class="field"><div class="label">가격 수정</div><div class="pricebox"><input type="number" value="${s.price}" min="1" step="10" onchange="price('${s.id}',this.value)"><span class="won">원</span></div></div><div class="field"><div class="label">가성비 점수</div><div class="score">${sc?sc+' 점':'-'}</div></div></div><div class="urlrow"><input type="url" placeholder="이미지 URL 붙여넣기" value="${s.img||''}"><button class="apply" onclick="setimg('${s.id}',this.previousElementSibling.value)">적용</button><button class="search" onclick="searchImg('${s.id}')">🔍 검색</button></div>`;cards.appendChild(el)});topUpdate()}
function find(id){return snacks.find(s=>s.id===id)}function rate(id,n){find(id).rating=n;save();render()}function price(id,v){find(id).price=Math.max(1,+v||1);save();render()}function setimg(id,v){find(id).img=(v||'').trim();save();render()}function searchImg(id){let s=find(id);window.open('https://www.google.com/search?tbm=isch&q='+encodeURIComponent(s.name+' 과자 제품 이미지'),'_blank')}function sortCards(){snacks.sort((a,b)=>score(b)-score(a));render()}function topUpdate(){let r=snacks.filter(s=>score(s)>0).sort((a,b)=>score(b)-score(a));topResult.innerHTML=r.length?`현재 1등: <strong>${r[0].name}</strong> / ${r[0].price.toLocaleString()}원 / <strong>${score(r[0])} 점</strong>`:'아직 만족도를 선택하지 않았습니다.'}function resetAll(){if(!confirm('수정값을 모두 초기화할까요?'))return;localStorage.removeItem('snackData');snacks=load();render()}function show(id){let s=find(id);modalImg.src=img(s);modalTitle.innerText=s.name;modal.classList.add('open')}function hideModal(){modal.classList.remove('open')}function closeModal(e){if(e.target.id==='modal')hideModal()}render();
</script>
</body>
</html>
