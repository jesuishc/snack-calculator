<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f5f7fb">
<title>과자 가격 비교표</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:'Malgun Gothic',system-ui,-apple-system,sans-serif;background:#f5f7fb;color:#172033}button,input{font:inherit}header{position:sticky;top:0;z-index:10;background:rgba(245,247,251,.96);backdrop-filter:blur(10px);padding:14px;border-bottom:1px solid #dfe4ec}h1{font-size:22px;margin:0;text-align:center}.sub{margin:5px 0 12px;text-align:center;color:#667085;font-size:13px}.addbar{max-width:1100px;margin:auto;display:grid;grid-template-columns:1fr auto;gap:8px}.addbar input{min-width:0;padding:13px;border:1px solid #cfd6e1;border-radius:12px;background:#fff}.btn{border:0;border-radius:12px;padding:11px 13px;font-weight:900;cursor:pointer}.primary{background:#1d4ed8;color:#fff}.dark{background:#111827;color:#fff}.soft{background:#e8edf5;color:#344054}.danger{background:#fff0f0;color:#c62828}.wrap{max-width:1100px;margin:auto;padding:14px}.tip{background:#fff;border:1px solid #dde3ec;border-radius:14px;padding:11px 13px;color:#667085;font-size:12px;line-height:1.5;margin-bottom:10px}.tablebox{overflow:auto;background:#fff;border:1px solid #dce2eb;border-radius:16px;box-shadow:0 5px 16px #0000000b}.sheet{width:100%;min-width:760px;border-collapse:separate;border-spacing:0}.sheet th,.sheet td{border-right:1px solid #e1e6ee;border-bottom:1px solid #e1e6ee;padding:9px;text-align:center;vertical-align:middle}.sheet th{position:sticky;top:0;background:#eef2f7;font-size:13px;z-index:2}.sheet th:first-child,.sheet td:first-child{position:sticky;left:0;z-index:3;background:#fff}.sheet th:first-child{background:#eef2f7;z-index:4}.sheet tr:last-child td{border-bottom:0}.sheet th:last-child,.sheet td:last-child{border-right:0}.product{min-width:180px;text-align:left!important}.pname{font-weight:900;line-height:1.3}.stars{white-space:nowrap;margin-top:5px}.star{border:0;background:none;padding:0 1px;color:#cbd1da;font-size:20px}.star.on{color:#f59e0b}.pricecell{min-width:145px}.priceinput{width:96px;text-align:right;border:1px solid #d7dde7;border-radius:9px;padding:8px;background:#fff;font-weight:800}.find{display:block;width:100%;margin-top:6px;border:0;border-radius:9px;padding:7px;background:#e8efff;color:#1746a2;font-size:12px;font-weight:900}.best{background:#ecfdf3!important}.best .priceinput{border-color:#12b76a;color:#087a49}.score{min-width:105px;font-weight:900;color:#d92d20}.rowactions{min-width:88px}.empty{text-align:center;padding:36px!important;color:#667085}.foot{display:flex;gap:8px;margin-top:10px}.foot button{flex:1}.modal{display:none;position:fixed;inset:0;z-index:30;background:#0009;padding:16px;align-items:flex-end;justify-content:center}.modal.open{display:flex}.panel{width:min(680px,100%);max-height:85vh;overflow:auto;background:#fff;border-radius:20px 20px 12px 12px;padding:14px}.panelhead{display:flex;justify-content:space-between;gap:10px;align-items:center;position:sticky;top:-14px;background:#fff;padding:4px 0 10px;z-index:2}.panel h2{font-size:18px;margin:0}.status{font-size:12px;color:#667085;margin:4px 0 10px}.candidate{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:11px;border:1px solid #e1e6ee;border-radius:12px;margin:7px 0;background:#fafbfc;text-align:left}.candidate strong{font-size:14px}.candidate small{display:block;color:#667085;margin-top:3px}.candidate .won{font-weight:900;color:#d92d20;white-space:nowrap}.fallback{display:grid;gap:8px;margin-top:12px}.fallback button{width:100%}.badge{display:inline-block;padding:3px 7px;border-radius:999px;background:#edf2ff;color:#214ca0;font-size:11px;font-weight:900;margin-left:4px}@media(max-width:600px){header{padding:12px}.wrap{padding:10px}.addbar{grid-template-columns:1fr}.addbar button{width:100%}.modal{padding:0}.panel{border-radius:20px 20px 0 0}.foot{display:grid}.sheet{min-width:700px}}
</style>
</head>
<body>
<header>
<h1>🛒 과자 가격 비교표</h1>
<p class="sub">과자를 직접 추가하고 판매처별 유사 상품 가격을 선택하세요</p>
<div class="addbar"><input id="newName" placeholder="과자 이름 입력 (예: 몽쉘 딸기)" autocomplete="off"><button class="btn primary" onclick="addSnack()">＋ 과자 추가</button></div>
</header>
<main class="wrap">
<div class="tip">표를 좌우로 밀어서 쿠팡·GS25·이마트24 가격을 비교할 수 있습니다. 가격은 직접 수정할 수도 있습니다. 자동검색은 공개 웹페이지 기준이며 점포·묶음 수량·행사 조건에 따라 실제 가격과 다를 수 있습니다.</div>
<div class="tablebox"><table class="sheet"><thead><tr><th class="product">과자 / 만족도</th><th>쿠팡</th><th>GS25</th><th>이마트24</th><th>최저가 기준<br>가성비</th><th>관리</th></tr></thead><tbody id="rows"></tbody></table></div>
<div class="foot"><button class="btn soft" onclick="sortRows()">🔥 가성비순 정렬</button><button class="btn soft" onclick="resetAll()">↩️ 전체 초기화</button></div>
</main>
<div class="modal" id="modal" onclick="backdrop(event)"><section class="panel"><div class="panelhead"><div><h2 id="modalTitle">유사 상품 선택</h2><div class="status" id="status"></div></div><button class="btn soft" onclick="closeModal()">닫기</button></div><div id="candidates"></div><div class="fallback" id="fallback"></div></section></div>
<script>
const STORE={
 coupang:{label:'쿠팡',url:q=>`https://www.coupang.com/np/search?q=${encodeURIComponent(q)}`,pkg:'com.coupang.mobile'},
 gs25:{label:'GS25',url:q=>`https://gs25.gsretail.com/gscvs/ko/products/event-goods?searchType=ALL&searchWord=${encodeURIComponent(q)}`,pkg:'com.gsr.gs25'},
 emart24:{label:'이마트24',url:q=>`https://m.emart24.co.kr/goods/event?search=${encodeURIComponent(q)}`,pkg:'kr.co.emart24.everse'}
};
const defaults=['몽쉘 딸기','버터링 초코','오예스 쿠앤크'].map((name,i)=>({id:Date.now()+i,name,rating:0,prices:{coupang:0,gs25:0,emart24:0}}));
let snacks=load(), active=null;
function load(){try{const v=JSON.parse(localStorage.getItem('snackSheetV2'));return Array.isArray(v)?v:defaults}catch{return defaults}}
function save(){localStorage.setItem('snackSheetV2',JSON.stringify(snacks))}
function esc(v=''){return String(v).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function bestPrice(s){const p=Object.values(s.prices||{}).filter(x=>Number(x)>0).map(Number);return p.length?Math.min(...p):0}
function score(s){const p=bestPrice(s);return p&&s.rating?Number((s.rating/p*1000).toFixed(2)):0}
function render(){rows.innerHTML='';if(!snacks.length){rows.innerHTML='<tr><td colspan="6" class="empty">위에서 과자를 추가해 주세요.</td></tr>';return}snacks.forEach(s=>{s.prices=s.prices||{};const best=bestPrice(s);const tr=document.createElement('tr');tr.innerHTML=`<td class="product"><div class="pname">${esc(s.name)}</div><div class="stars">${[1,2,3,4,5].map(n=>`<button class="star ${s.rating>=n?'on':''}" onclick="rate('${s.id}',${n})">★</button>`).join('')}</div></td>${['coupang','gs25','emart24'].map(k=>`<td class="pricecell ${best&&Number(s.prices[k])===best?'best':''}"><input class="priceinput" inputmode="numeric" type="number" min="0" placeholder="가격" value="${s.prices[k]||''}" onchange="setPrice('${s.id}','${k}',this.value)"> 원<button class="find" onclick="findSimilar('${s.id}','${k}')">유사 상품 찾기</button></td>`).join('')}<td class="score">${score(s)?score(s)+'점':'-'}</td><td class="rowactions"><button class="btn danger" onclick="removeSnack('${s.id}')">삭제</button></td>`;rows.appendChild(tr)})}
function addSnack(){const name=newName.value.trim();if(name.length<2)return alert('과자 이름을 2글자 이상 입력하세요.');snacks.unshift({id:String(Date.now()),name,rating:0,prices:{coupang:0,gs25:0,emart24:0}});newName.value='';save();render()}
function removeSnack(id){if(!confirm('이 과자를 삭제할까요?'))return;snacks=snacks.filter(s=>String(s.id)!==String(id));save();render()}
function rate(id,n){const s=snacks.find(x=>String(x.id)===String(id));s.rating=n;save();render()}
function setPrice(id,k,v){const s=snacks.find(x=>String(x.id)===String(id));s.prices[k]=Math.max(0,Number(v)||0);save();render()}
function sortRows(){snacks.sort((a,b)=>score(b)-score(a));save();render()}
function resetAll(){if(!confirm('추가한 과자와 가격을 모두 초기화할까요?'))return;localStorage.removeItem('snackSheetV2');snacks=defaults.map(x=>({...x,prices:{...x.prices}}));save();render()}
function clean(v=''){return v.replace(/!\[[^\]]*\]\([^)]*\)/g,' ').replace(/\[([^\]]+)\]\([^)]*\)/g,'$1').replace(/[*_#>|`]/g,' ').replace(/\s+/g,' ').trim()}
function tokens(q){return q.toLowerCase().replace(/[^0-9a-z가-힣 ]/g,' ').split(/\s+/).filter(x=>x.length>1)}
function similarity(name,q){const t=tokens(q),n=name.toLowerCase();return t.reduce((a,x)=>a+(n.includes(x)?1:0),0)/Math.max(1,t.length)}
function parseProducts(text,store,q){const out=[],seen=new Set(),re=/([0-9][0-9,]{2,})\s*원/g;let m;while((m=re.exec(text))&&out.length<30){const before=text.slice(Math.max(0,m.index-320),m.index);const lines=before.split('\n').map(clean).filter(x=>x.length>1&&x.length<150);let name=[...lines].reverse().find(x=>similarity(x,q)>0)||lines.at(-1)||q;name=name.replace(/^(NEW|1\s*\+\s*1|2\s*\+\s*1|3\s*\+\s*1|세일)\s*/i,'').trim();const price=Number(m[1].replace(/,/g,'')),key=name+'|'+price;if(!price||seen.has(key)||similarity(name,q)===0)continue;seen.add(key);out.push({store,name,price,sim:similarity(name,q)})}return out.sort((a,b)=>b.sim-a.sim)}
async function reader(url){const r=await fetch('https://r.jina.ai/'+url,{headers:{Accept:'text/plain'}});if(!r.ok)throw new Error('응답 '+r.status);return r.text()}
async function findSimilar(id,store){const s=snacks.find(x=>String(x.id)===String(id));active={id,store,q:s.name};modalTitle.textContent=`${STORE[store].label} · ${s.name}`;status.textContent='유사 상품 가격을 찾고 있습니다…';candidates.innerHTML='';fallback.innerHTML='';modal.classList.add('open');try{let urls=[STORE[store].url(s.name)];if(store==='gs25')urls.push('https://gs25.gsretail.com/gscvs/ko','https://gs25.gsretail.com/gscvs/ko/products/event-goods');const texts=await Promise.allSettled(urls.map(reader));const items=texts.filter(x=>x.status==='fulfilled').flatMap(x=>parseProducts(x.value,store,s.name));const unique=[];const seen=new Set();items.forEach(x=>{const k=x.name+'|'+x.price;if(!seen.has(k)){seen.add(k);unique.push(x)}});showCandidates(unique.slice(0,12));if(!unique.length)throw new Error('일치 상품 없음')}catch(e){status.textContent='자동 가격을 찾지 못했습니다. 앱 또는 공식 검색 화면을 열어 확인하세요.';showFallback(store,s.name)}}
function showCandidates(items){candidates.innerHTML='';status.textContent=items.length?`${items.length}개의 유사 상품 중 하나를 선택하세요.`:'유사 상품이 없습니다.';items.forEach(x=>{const b=document.createElement('button');b.className='candidate';b.innerHTML=`<span><strong>${esc(x.name)}</strong><small>${STORE[x.store].label}<span class="badge">유사도 ${Math.round(x.sim*100)}%</span></small></span><span class="won">${x.price.toLocaleString()}원</span>`;b.onclick=()=>choose(x);candidates.appendChild(b)});showFallback(active.store,active.q)}
function choose(x){const s=snacks.find(v=>String(v.id)===String(active.id));s.prices[active.store]=x.price;s.matches=s.matches||{};s.matches[active.store]=x.name;save();render();closeModal()}
async function copyQuery(q){try{await navigator.clipboard.writeText(q);status.textContent=`“${q}”를 복사했습니다. 앱에서 검색창을 눌러 붙여넣으세요.`}catch{status.textContent=`앱 검색어: ${q}`}}
function showFallback(store,q){fallback.innerHTML='';const web=document.createElement('button');web.className='btn dark';web.textContent=`${STORE[store].label} 공식 검색 열기`;web.onclick=()=>window.open(STORE[store].url(q),'_blank','noopener');fallback.appendChild(web);const app=document.createElement('button');app.className='btn primary';app.textContent=`${STORE[store].label} 앱 열기 (검색어 복사)`;app.onclick=()=>openApp(store,q);fallback.appendChild(app);if(store!=='coupang'){const nav=document.createElement('button');nav.className='btn soft';nav.textContent='네이버쇼핑에서 대신 검색';nav.onclick=()=>window.open(`https://search.shopping.naver.com/search/all?query=${encodeURIComponent(q)}`,'_blank','noopener');fallback.appendChild(nav)}}
async function openApp(store,q){await copyQuery(q);if(store==='coupang'){location.href=STORE.coupang.url(q);return}const pkg=STORE[store].pkg,play=`https://play.google.com/store/apps/details?id=${pkg}`;location.href=`intent://open#Intent;scheme=${store};package=${pkg};S.browser_fallback_url=${encodeURIComponent(play)};end`}
function closeModal(){modal.classList.remove('open')}function backdrop(e){if(e.target===modal)closeModal()}
newName.addEventListener('keydown',e=>{if(e.key==='Enter')addSnack()});render();
</script>
</body>
</html>
