<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>마트 과자 가성비 계산기</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:'Malgun Gothic',system-ui,sans-serif;background:#f5f7fb;color:#1f2937}header{position:sticky;top:0;z-index:5;background:rgba(245,247,251,.96);backdrop-filter:blur(8px);padding:14px;border-bottom:1px solid #e5e7eb}h1{margin:0;text-align:center;font-size:22px}.sub{text-align:center;color:#6b7280;font-size:13px;margin:6px 0 12px}.lookup{max-width:900px;margin:auto;background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:12px;box-shadow:0 4px 12px #0000000d}.lookuprow{display:grid;grid-template-columns:1fr 105px 105px;gap:8px}.lookup input,.lookup select{min-width:0;border:1px solid #d1d5db;border-radius:11px;padding:11px;background:#fff;font-size:14px}.lookup button,.actions button,.apply{border:0;border-radius:11px;padding:11px;font-weight:800;cursor:pointer}.lookup button{background:#111827;color:#fff}.status{font-size:12px;color:#6b7280;margin-top:8px}.results{display:grid;gap:7px;margin-top:9px}.result{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;padding:9px;border-radius:11px;background:#f9fafb;border:1px solid #e5e7eb}.result strong{font-size:14px}.result small{display:block;color:#6b7280;margin-top:3px}.result .price{font-weight:900;color:#dc2626;white-space:nowrap}.apply{background:#2563eb;color:#fff;font-size:12px;padding:8px 10px}.topbox{max-width:900px;margin:12px auto 0;background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:12px}.actions{max-width:900px;margin:8px auto 0;display:grid;grid-template-columns:1fr 1fr;gap:8px}.actions button:first-child{background:#2563eb;color:#fff}.actions button:last-child{background:#e5e7eb;color:#374151}.cards{max-width:900px;margin:auto;padding:14px;display:grid;gap:12px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:18px;padding:12px;box-shadow:0 5px 14px #0000000f}.top{display:grid;grid-template-columns:82px 1fr;gap:12px}.thumb{width:82px;height:82px;border-radius:14px;object-fit:cover;background:#eef2ff;border:1px solid #e5e7eb}.name{font-size:17px;font-weight:900}.badge{display:inline-block;margin-top:6px;padding:4px 8px;border-radius:999px;background:#dbeafe;color:#1d4ed8;font-size:12px;font-weight:800}.stars{display:flex;margin-top:5px}.star{border:0;background:none;padding:0 2px;font-size:24px;color:#d1d5db}.star.on{color:#f59e0b}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.field{background:#f9fafb;border:1px solid #e5e7eb;border-radius:12px;padding:8px}.label{font-size:11px;color:#6b7280;font-weight:800;margin-bottom:4px}.field input{width:100%;border:0;background:transparent;outline:none;font-size:15px;font-weight:800}.score{font-size:18px;font-weight:900;color:#ef4444}.notice{max-width:900px;margin:0 auto;padding:0 14px 18px;color:#6b7280;font-size:12px;line-height:1.5}@media(min-width:760px){.cards{grid-template-columns:1fr 1fr}}@media(max-width:560px){.lookuprow{grid-template-columns:1fr 90px}.lookuprow button{grid-column:1/3}.result{grid-template-columns:1fr auto}.result .apply{grid-column:1/3}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
<h1>🛒 마트 과자 가성비 계산기</h1>
<p class="sub">쿠팡·GS25 가격 검색 후 선택한 상품에 바로 적용</p>
<section class="lookup">
  <div class="lookuprow">
    <input id="query" placeholder="예: 몽쉘 딸기" autocomplete="off">
    <select id="retailer"><option value="all">전체</option><option value="coupang">쿠팡</option><option value="gs25">GS25 행사</option></select>
    <button onclick="lookupPrice()">가격 검색</button>
  </div>
  <div class="status" id="lookupStatus">모바일에서도 가격 검색을 사용할 수 있습니다. 결과는 옵션·묶음 수량·점포에 따라 다를 수 있습니다.</div>
  <div class="results" id="lookupResults"></div>
</section>
<div class="topbox" id="topResult">아직 만족도를 선택하지 않았습니다.</div>
<div class="actions"><button onclick="sortCards()">🔥 가성비순 정렬</button><button onclick="resetAll()">↩️ 전체 초기화</button></div>
</header>
<main class="cards" id="cards"></main>
<p class="notice">가격 조회는 공개 웹페이지를 읽는 실험 기능입니다. 자동 조회가 제한되면 쿠팡·GS25·네이버쇼핑 직접 검색 버튼이 표시됩니다.</p>
<script>
const fallback='https://placehold.co/500x500/f3f4f6/334155?text=Snack';
const data=[['mongshell_strawberry','몽쉘 딸기',4980],['butterring_choco','버터링 초코',4070],['ohyes_cnc','오예스 쿠앤크',4800],['butterwaffle_isigny','버터와플 이즈니',3280],['churros_choco','츄러스 초코',1480],['chocopie_mango','초코파이 망고',4690],['fresh_berry','후레쉬 베리',5650],['custard_peanut','카스타드 피넛버터',2730],['dubai_heim','두바이 하임',3690],['ohyes_pistachio','오예스 피스타치오',5100],['bigpie_lemon','빅파이 레몬',4080],['na_sand','나! 샌드',1390],['custard_matcha','카스타드 말차',4735],['homerunball','홈런볼',5600],['bbotto_cheese','뽀또 체다치즈',2700],['nurungji_maple','누룽지 메이플',1360],['noodlefit_spicy','누들핏 매콤',2530],['chocopie_matcha','초코파이 말차',4560],['butterring_pistachio','버터링 피스타치오',3290],['matcha_heim','말차하임',6390]];
let snacks=load(), targetId='';
function autoImg(n){return 'https://tse4.mm.bing.net/th?q='+encodeURIComponent(n+' 과자 제품 이미지')+'&w=300&h=300&c=7&rs=1&p=0&o=5&pid=1.7'}
function load(){const saved=JSON.parse(localStorage.getItem('snackData')||'{}');return data.map(x=>({id:x[0],name:x[1],price:x[2],...(saved[x[0]]||{})}))}
function save(){const o={};snacks.forEach(s=>o[s.id]={price:s.price,rating:s.rating||0});localStorage.setItem('snackData',JSON.stringify(o))}
function score(s){return s.rating>0&&s.price>0?Number((s.rating/s.price*1000).toFixed(2)):0}
function render(){cards.innerHTML='';snacks.forEach(s=>{const el=document.createElement('section');el.className='card';el.innerHTML=`<div class="top"><img class="thumb" src="${autoImg(s.name)}" onerror="this.src=fallback"><div><div class="name">${s.name}</div><span class="badge">가격 검색 대상</span><div class="stars">${[1,2,3,4,5].map(n=>`<button class="star ${(s.rating||0)>=n?'on':''}" onclick="rate('${s.id}',${n})">★</button>`).join('')}</div></div></div><div class="grid"><div class="field"><div class="label">가격</div><input type="number" value="${s.price}" onchange="price('${s.id}',this.value)"></div><div class="field"><div class="label">가성비 점수</div><div class="score">${score(s)||'-'}</div></div></div><button class="apply" style="width:100%;margin-top:8px" onclick="searchFor('${s.id}')">이 상품 가격 검색</button>`;cards.appendChild(el)});topUpdate()}
function find(id){return snacks.find(s=>s.id===id)}
function rate(id,n){find(id).rating=n;save();render()}
function price(id,v){find(id).price=Math.max(1,+v||1);save();render()}
function sortCards(){snacks.sort((a,b)=>score(b)-score(a));render()}
function topUpdate(){const r=snacks.filter(s=>score(s)>0).sort((a,b)=>score(b)-score(a));topResult.innerHTML=r.length?`현재 1등: <strong>${r[0].name}</strong> / ${r[0].price.toLocaleString()}원 / <strong>${score(r[0])}점</strong>`:'아직 만족도를 선택하지 않았습니다.'}
function resetAll(){if(!confirm('수정값을 초기화할까요?'))return;localStorage.removeItem('snackData');snacks=load();render()}
function searchFor(id){targetId=id;query.value=find(id).name;lookupPrice();document.querySelector('.lookup').scrollIntoView({behavior:'smooth'})}
async function lookupPrice(){const q=query.value.trim();if(q.length<2)return alert('상품명을 2글자 이상 입력하세요.');lookupStatus.textContent='가격을 조회하고 있습니다…';lookupResults.innerHTML='';try{const r=await fetch(`/api/prices?q=${encodeURIComponent(q)}&retailer=${retailer.value}`);const type=r.headers.get('content-type')||'';if(!type.includes('application/json'))throw new Error('서버 API 없음');const json=await r.json();if(!r.ok)throw new Error(json.error||'조회 실패');const items=json.results.flatMap(group=>group.products||[]);lookupStatus.textContent=items.length?`${items.length}개 결과 · ${new Date(json.checkedAt).toLocaleString()}`:'검색 결과가 없습니다.';items.forEach(item=>{const el=document.createElement('div');el.className='result';el.innerHTML=`<div><strong>${item.name}</strong><small>${item.retailer.toUpperCase()} ${item.promotion||''}</small></div><span class="price">${item.price.toLocaleString()}원</span><button class="apply">가격 적용</button>`;el.querySelector('button').onclick=()=>applyResult(item);lookupResults.appendChild(el)})}catch(e){throw e}}
function applyResult(item){let s=targetId?find(targetId):snacks.find(x=>x.name.includes(query.value)||query.value.includes(x.name));if(!s){alert('먼저 카드의 “이 상품 가격 검색” 버튼으로 검색하세요.');return}s.price=item.price;save();render();lookupStatus.textContent=`${s.name} 가격을 ${item.price.toLocaleString()}원으로 적용했습니다.`}
query.addEventListener('keydown',e=>{if(e.key==='Enter')lookupPrice()});render();
</script>
<script src="mobile-price.js"></script>
</body>
</html>
